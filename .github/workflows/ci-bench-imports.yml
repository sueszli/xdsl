name: CI - Benchmark Imports

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  bench-imports:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'

    - name: Install without bench dependencies
      run: uv sync

    - name: Import all benchmark files
      run: |
        uv run python -c "
        import importlib
        from pathlib import Path

        for p in sorted(Path('benchmarks').glob('*.py')):
            if p.stem == '__init__':
                continue
            mod = f'benchmarks.{p.stem}'
            print(f'Importing {mod}')
            importlib.import_module(mod)
        print('All benchmark files imported successfully.')
        "
